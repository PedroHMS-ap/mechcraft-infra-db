name: infra-db-terraform

on:
  push:
    branches: [homolog, main]
  pull_request:
    branches: [homolog, main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check
      - run: terraform init -backend=false
      - run: terraform validate

  deploy-homolog:
    if: github.event_name != 'pull_request' && github.ref_name == 'homolog'
    needs: validate
    runs-on: ubuntu-latest
    environment: homolog
    env:
      TFSTATE_RESOURCE_GROUP: mechcraft-tfstate-rg
      TFSTATE_STORAGE_ACCOUNT: peddrmctf62170
      TFSTATE_CONTAINER: tfstate
      TFSTATE_KEY: mechcraft/infra-db.tfstate
      TFSTATE_LOCATION: centralus
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Ensure Terraform backend
        shell: bash
        run: |
          az group create --name "${TFSTATE_RESOURCE_GROUP}" --location "${TFSTATE_LOCATION}"
          if ! az storage account show --resource-group "${TFSTATE_RESOURCE_GROUP}" --name "${TFSTATE_STORAGE_ACCOUNT}" >/dev/null 2>&1; then
            az storage account create \
              --resource-group "${TFSTATE_RESOURCE_GROUP}" \
              --name "${TFSTATE_STORAGE_ACCOUNT}" \
              --location "${TFSTATE_LOCATION}" \
              --sku Standard_LRS \
              --kind StorageV2 \
              --min-tls-version TLS1_2 \
              --allow-blob-public-access false
          fi
          STORAGE_KEY="$(az storage account keys list --resource-group "${TFSTATE_RESOURCE_GROUP}" --account-name "${TFSTATE_STORAGE_ACCOUNT}" --query '[0].value' -o tsv)"
          az storage container create \
            --name "${TFSTATE_CONTAINER}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --account-key "${STORAGE_KEY}" >/dev/null
          cat > backend.hcl <<EOF
          resource_group_name  = "${TFSTATE_RESOURCE_GROUP}"
          storage_account_name = "${TFSTATE_STORAGE_ACCOUNT}"
          container_name       = "${TFSTATE_CONTAINER}"
          key                  = "${TFSTATE_KEY}"
          access_key           = "${STORAGE_KEY}"
          EOF
      - run: terraform init -reconfigure -backend-config=backend.hcl
      - name: Import existing resources into Terraform state
        shell: bash
        env:
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          SERVER_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/mechcraft-rg/providers/Microsoft.DBforPostgreSQL/flexibleServers/mechcraft-pg-2583"
          DATABASE_ID="${SERVER_ID}/databases/mechcraft"
          FIREWALL_ID="${SERVER_ID}/firewallRules/allow-azure-services"
          TIMEZONE_ID="${SERVER_ID}/configurations/timezone"

          if az resource show --ids "${SERVER_ID}" >/dev/null 2>&1; then
            terraform state show azurerm_postgresql_flexible_server.this >/dev/null 2>&1 || terraform import azurerm_postgresql_flexible_server.this "${SERVER_ID}"
            terraform state show azurerm_postgresql_flexible_server_configuration.timezone >/dev/null 2>&1 || terraform import azurerm_postgresql_flexible_server_configuration.timezone "${TIMEZONE_ID}"

            if az postgres flexible-server db show --resource-group mechcraft-rg --server-name mechcraft-pg-2583 --database-name mechcraft >/dev/null 2>&1; then
              terraform state show azurerm_postgresql_flexible_server_database.app >/dev/null 2>&1 || terraform import azurerm_postgresql_flexible_server_database.app "${DATABASE_ID}"
            fi

            if az postgres flexible-server firewall-rule show --resource-group mechcraft-rg --name mechcraft-pg-2583 --rule-name allow-azure-services >/dev/null 2>&1; then
              terraform state show azurerm_postgresql_flexible_server_firewall_rule.allow_azure_services >/dev/null 2>&1 || terraform import azurerm_postgresql_flexible_server_firewall_rule.allow_azure_services "${FIREWALL_ID}"
            fi
          fi

      - run: terraform plan -out=tfplan
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      - run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}

  deploy-production:
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      TFSTATE_RESOURCE_GROUP: mechcraft-tfstate-rg
      TFSTATE_STORAGE_ACCOUNT: peddrmctf62170
      TFSTATE_CONTAINER: tfstate
      TFSTATE_KEY: mechcraft/infra-db.tfstate
      TFSTATE_LOCATION: centralus
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Ensure Terraform backend
        shell: bash
        run: |
          az group create --name "${TFSTATE_RESOURCE_GROUP}" --location "${TFSTATE_LOCATION}"
          if ! az storage account show --resource-group "${TFSTATE_RESOURCE_GROUP}" --name "${TFSTATE_STORAGE_ACCOUNT}" >/dev/null 2>&1; then
            az storage account create \
              --resource-group "${TFSTATE_RESOURCE_GROUP}" \
              --name "${TFSTATE_STORAGE_ACCOUNT}" \
              --location "${TFSTATE_LOCATION}" \
              --sku Standard_LRS \
              --kind StorageV2 \
              --min-tls-version TLS1_2 \
              --allow-blob-public-access false
          fi
          STORAGE_KEY="$(az storage account keys list --resource-group "${TFSTATE_RESOURCE_GROUP}" --account-name "${TFSTATE_STORAGE_ACCOUNT}" --query '[0].value' -o tsv)"
          az storage container create \
            --name "${TFSTATE_CONTAINER}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --account-key "${STORAGE_KEY}" >/dev/null
          cat > backend.hcl <<EOF
          resource_group_name  = "${TFSTATE_RESOURCE_GROUP}"
          storage_account_name = "${TFSTATE_STORAGE_ACCOUNT}"
          container_name       = "${TFSTATE_CONTAINER}"
          key                  = "${TFSTATE_KEY}"
          access_key           = "${STORAGE_KEY}"
          EOF
      - run: terraform init -reconfigure -backend-config=backend.hcl
      - name: Import existing resources into Terraform state
        shell: bash
        env:
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          SERVER_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/mechcraft-rg/providers/Microsoft.DBforPostgreSQL/flexibleServers/mechcraft-pg-2583"
          DATABASE_ID="${SERVER_ID}/databases/mechcraft"
          FIREWALL_ID="${SERVER_ID}/firewallRules/allow-azure-services"
          TIMEZONE_ID="${SERVER_ID}/configurations/timezone"

          if az resource show --ids "${SERVER_ID}" >/dev/null 2>&1; then
            terraform state show azurerm_postgresql_flexible_server.this >/dev/null 2>&1 || terraform import azurerm_postgresql_flexible_server.this "${SERVER_ID}"
            terraform state show azurerm_postgresql_flexible_server_configuration.timezone >/dev/null 2>&1 || terraform import azurerm_postgresql_flexible_server_configuration.timezone "${TIMEZONE_ID}"

            if az postgres flexible-server db show --resource-group mechcraft-rg --server-name mechcraft-pg-2583 --database-name mechcraft >/dev/null 2>&1; then
              terraform state show azurerm_postgresql_flexible_server_database.app >/dev/null 2>&1 || terraform import azurerm_postgresql_flexible_server_database.app "${DATABASE_ID}"
            fi

            if az postgres flexible-server firewall-rule show --resource-group mechcraft-rg --name mechcraft-pg-2583 --rule-name allow-azure-services >/dev/null 2>&1; then
              terraform state show azurerm_postgresql_flexible_server_firewall_rule.allow_azure_services >/dev/null 2>&1 || terraform import azurerm_postgresql_flexible_server_firewall_rule.allow_azure_services "${FIREWALL_ID}"
            fi
          fi

      - run: terraform plan -out=tfplan
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      - run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
